# ─────────────────────────────────────────────────────────────────────────────
# VoiceOrder — Local Development Stack
# Usage: docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── FastAPI Application ──────────────────────────────────────────────────
  api:
    build: .
    container_name: voiceorder_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:dev@db:5432/voiceorder
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Live-reload: mount source — comment out in prod
      - ./app:/app/app
    restart: unless-stopped
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: voiceorder_db
    environment:
      POSTGRES_DB: voiceorder
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d voiceorder"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voiceorder_redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no   # dev: no persistence
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
