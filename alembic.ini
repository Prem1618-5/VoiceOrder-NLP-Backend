# ─────────────────────────────────────────────────────────────────────────────
# Alembic Configuration
# The actual DB URL is injected at runtime from DATABASE_URL env var
# (see db/migrations/env.py).  The sqlalchemy.url below is a placeholder.
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
script_location = db/migrations
prepend_sys_path = .
version_path_separator = os        # use os.sep between version locations

# Placeholder — overridden by env.py reading DATABASE_URL env var
sqlalchemy.url = driver://user:pass@localhost/dbname

# ── Migration file naming ─────────────────────────────────────────────────────
file_template = %%(rev)s_%%(slug)s

# ── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
