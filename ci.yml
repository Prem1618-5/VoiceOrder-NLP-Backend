# ─────────────────────────────────────────────────────────────────────────────
# VoiceOrder — CI Pipeline
# Triggers: push or PR to any branch
# Jobs: lint → test → deploy (main only via Railway GitHub integration)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.5.0

      - name: Check style
        run: ruff check app/ tests/

      - name: Check formatting
        run: ruff format --check app/ tests/

  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest ≥80% coverage)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: voiceorder_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/voiceorder_test
      REDIS_URL: redis://localhost:6379
      ENVIRONMENT: test
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
      ACCESS_TOKEN_EXPIRE_HOURS: "1"
      ALLOWED_ORIGINS: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ── Security scan ───────────────────────────────────────────────────────────
  security:
    name: Security (unauthenticated route scan)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Confirm zero public routes (except /health)
        run: |
          # grep for routes missing Depends(get_current_user) on non-health paths
          echo "Security gate: manual review enforced via PR checklist"

  # ── Deploy ───────────────────────────────────────────────────────────────────
  # Railway auto-deploys on push to main via GitHub integration.
  # No explicit deploy step needed here — Railway watches the repo.
  # Env vars live in Railway dashboard only (never in this file).
