[pytest]
# pytest-asyncio: treat all async test functions and fixtures as asyncio automatically.
# This removes the need for @pytest.mark.asyncio on every async test.
asyncio_mode = auto

# Session-level event loop so session-scoped async fixtures share one loop.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session

# Test discovery
testpaths   = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings (mirrors CI --cov flags)
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=80
    -v
